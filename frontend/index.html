<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watchlist Top Movers</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Watchlist Top Movers</h1>
        <p class="subtitle">Daily absolute % change winner — last 7 days</p>
      </header>

      <div id="status" class="status" role="status" aria-live="polite">Loading…</div>

      <div id="table-wrap" class="table-wrap" hidden>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Ticker</th>
              <th>% Change</th>
              <th>Close</th>
            </tr>
          </thead>
          <tbody id="movers-body"></tbody>
        </table>
      </div>
    </main>

    <!--
      config.js is generated at deploy time (gitignored) from Terraform output.
      See config.js.example and scripts/deploy_frontend.sh.
    -->
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
